; PHP-FPM pool tuning for small containers.
; Bounds total memory so a heavy queue job never OOM-kills the container
; (which was causing intermittent HTTP 500s on poll requests during long analyses).
[www]
user = www-data
group = www-data
listen = 127.0.0.1:9000

pm = ondemand
pm.max_children = 4
pm.process_idle_timeout = 10s
pm.max_requests = 500

; Keep FPM responsive; requests are proxied by nginx (300s read timeout)
request_terminate_timeout = 130

catch_workers_output = yes
decorate_workers_output = no
